<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyKiloSell WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .screen { display: none; }
        .active-screen { display: block; }
    </style>
</head>
<body>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Navigation Function (ဒီတစ်ခု လိုနေတာပါ)
        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            window.scrollTo(0, 0);
        }

        // 2. Google Sheets Link (လင့်ခ်အမှန်)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUpnbjrhv9h8MbQDUNjvcCmhZGGl5JPomf40OZXNU6C_XgRnUfvJuttLGdvPMR_cmMVQ/exec";

        async function postToDatabase(type) {
            let data = {
                userName: tg.initDataUnsafe.user?.first_name || "Guest",
                type: type,
                from: document.getElementById(type === 'Travel Offer' ? 's-from' : 'b-from').value,
                to: document.getElementById(type === 'Travel Offer' ? 's-to' : 'b-to').value,
                kilo: document.getElementById(type === 'Travel Offer' ? 's-kilo' : 'b-kilo').value,
                price: document.getElementById(type === 'Travel Offer' ? 's-price' : 'b-price').value
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                alert("Posted Successfully!");
                nav('screen-hub'); 
            } catch (e) { alert("Error: " + e); }
        }
    </script>
</body>
</html>
