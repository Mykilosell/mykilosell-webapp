<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyKiloSell WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>/* အစ်ကို့ မူလ Style များအတိုင်း */</style>
</head>
<body>
    <div id="screen-sell" class="screen">
        <h2>✈️ Post Your Travel</h2>
        <div class="form-group"><input type="text" id="s-from" list="cities" placeholder="Leaving From"></div>
        <div class="form-group"><input type="text" id="s-to" list="cities" placeholder="Going To"></div>
        <div class="form-group"><input type="date" id="s-date"></div>
        <div class="form-group"><input type="number" id="s-kilo" placeholder="Kilos"></div>
        <div class="form-group">
            <select id="s-currency"><option>THB</option><option>MMK</option><option>USD</option></select>
            <input type="number" id="s-price" placeholder="Amount">
        </div>
        <div class="form-group"><textarea id="s-note" placeholder="Notes"></textarea></div>
        <button class="btn btn-success" onclick="postToDatabase('Travel')">✅ Post Travel</button>
    </div>

    <div id="screen-buy" class="screen">
        <h2>📦 Post Cargo Request</h2>
        <div class="form-group"><input type="text" id="b-from" list="cities" placeholder="From"></div>
        <div class="form-group"><input type="text" id="b-to" list="cities" placeholder="To"></div>
        <button class="btn" style="background-color: #f39c12;" onclick="postToDatabase('Cargo')">✅ Post Request</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUpnbjrhv9h8MbQDUNjvcCmhZGGl5JPomf40OZXNU6C_XgRnUfvJuttLGdvPMR_cmMVQ/exec";
        let tg = window.Telegram.WebApp;
        
        async function postToDatabase(type) {
            const data = {
                userName: tg.initDataUnsafe.user?.first_name || "Guest",
                type: type,
                from: document.getElementById(type === 'Travel' ? 's-from' : 'b-from').value,
                to: document.getElementById(type === 'Travel' ? 's-to' : 'b-to').value,
                kilo: document.getElementById(type === 'Travel' ? 's-kilo' : 'b-kilo')?.value || 0,
                price: document.getElementById(type === 'Travel' ? 's-price' : 'b-price')?.value || 0,
                note: document.getElementById(type === 'Travel' ? 's-note' : 'b-item')?.value || ""
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                alert("Posted Successfully!");
                nav('screen-hub');
            } catch (e) { alert("Error: " + e); }
        }
        // (အစ်ကို့ရဲ့ ကျန်တဲ့ nav, loadCities, setLang function များ ဒီအောက်မှာ ဆက်ထည့်ပါ)
    </script>
</body>
</html>
