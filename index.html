<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyKiloSell WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #12181f; --text-color: #ffffff; --primary-btn: #0088cc; --input-bg: #2a3542; --card-bg: #1e2732; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 15px; }
        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .active-screen { display: block; }
        .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 8px; background-color: var(--primary-btn); color: white; font-weight: bold; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background-color: var(--input-bg); color: white; box-sizing: border-box; }
        h2 { text-align: center; }
    </style>
</head>
<body>

    <div id="screen-onboard" class="screen active-screen">
        <h2>Welcome to MyKiloSell</h2>
        <label><input type="checkbox" onchange="document.getElementById('btn-start').disabled = !this.checked"> I agree to terms.</label>
        <button class="btn" id="btn-start" disabled onclick="nav('screen-hub')">Continue</button>
    </div>

    <div id="screen-hub" class="screen">
        <h2>What would you like to do?</h2>
        <button class="btn" onclick="nav('screen-sell')">Post Travel (Sell)</button>
        <button class="btn" style="background: #f39c12;" onclick="nav('screen-buy')">Post Cargo Need (Buy)</button>
    </div>

    <div id="screen-sell" class="screen">
        <h2>✈️ Post Your Travel</h2>
        <div class="form-group"><input type="text" id="s-from" placeholder="Leaving From"></div>
        <div class="form-group"><input type="text" id="s-to" placeholder="Going To"></div>
        <div class="form-group"><input type="number" id="s-kilo" placeholder="Available Kilos"></div>
        <div class="form-group"><input type="number" id="s-price" placeholder="Price"></div>
        <button class="btn" onclick="sendToTelegram('Travel')">✅ Post Travel</button>
        <button class="btn" style="background:#666;" onclick="nav('screen-hub')">Back</button>
    </div>

    <div id="screen-buy" class="screen">
        <h2>📦 Post Cargo Request</h2>
        <div class="form-group"><input type="text" id="b-from" placeholder="Send From"></div>
        <div class="form-group"><input type="text" id="b-to" placeholder="Send To"></div>
        <div class="form-group"><input type="number" id="b-kilo" placeholder="Required Kilos"></div>
        <button class="btn" style="background: #f39c12;" onclick="sendToTelegram('Cargo')">✅ Post Request</button>
        <button class="btn" style="background:#666;" onclick="nav('screen-hub')">Back</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        const BOT_TOKEN = "8655443147:AAFao2tmUpPUDpJxQcI5a8JZfvhzemHCoFU";
        const CHAT_ID = "8655443147";

        async function sendToTelegram(type) {
            let msg = `🚀 *New Post: ${type}*\n👤 User: ${tg.initDataUnsafe.user?.first_name || "Guest"}\n`;
            msg += `🛫 From: ${document.getElementById(type === 'Travel' ? 's-from' : 'b-from').value}\n`;
            msg += `🛬 To: ${document.getElementById(type === 'Travel' ? 's-to' : 'b-to').value}\n`;
            msg += `⚖️ Kilo: ${document.getElementById(type === 'Travel' ? 's-kilo' : 'b-kilo').value}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

            try {
                await fetch(url);
                alert("Posted successfully!");
                nav('screen-hub');
            } catch (e) { alert("Error sending post."); }
        }
    </script>
</body>
</html>
